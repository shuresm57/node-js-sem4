<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Trirong">
    <style>

        body { 
            background-color: #121212; 
            font-family: "Trirong", serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        h1 { 
            color: lightgray;
            font-size: 256px;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 1s;
        }

        .p1 {
            color: whitesmoke;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 2s;
        }

        .p2 {
            color: red;
            opacity: 0;
            animation: fadeIn 2s forwards;
            animation-delay: 4s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

    </style>
    <title>Unix Counter</title>
</head>
<body>

    <h1 id="unix-counter">Counter</h1>

    <p class="p1">On January 19, 2038 the current Unix Time 
        Stamp will no longer be applicable for non 32-bit systems. 
    </p>
    <p class="p2">
         I propose we start a new one.
    </p>

    <script>

        const newUnix = new Date(2025, 7, 28, 3, 30).getTime();
        const unixCounter = document.getElementById('unix-counter')

        function getTimeSinceBirthInUnix(){
            const elapsedTimeUnix = Math.floor((Date.now() - newUnix) / 1000);
            unixCounter.textContent = elapsedTimeUnix;
        }

        getTimeSinceBirthInUnix()
        setInterval(getTimeSinceBirthInUnix, 1000);

    </script>
</body>
</html>
